<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AGND · App</title>
  <link rel="icon" href="assets/mark-A.png" />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="app.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="light" data-accent="aqua">
<div id="root"></div>

<script type="text/babel" src="MosaicTile.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="DashboardHome.jsx"></script>
<script type="text/babel" src="AgendaSection.jsx"></script>
<script type="text/babel" src="ClientesSection.jsx"></script>
<script type="text/babel" src="EquipoSection.jsx"></script>
<script type="text/babel" src="EspaciosSection.jsx"></script>
<script type="text/babel" src="RecursosSection.jsx"></script>
<script type="text/babel" src="ServiciosSection.jsx"></script>
<script type="text/babel" src="CuentaSection.jsx"></script>
<script type="text/babel" src="ReservasConfigSection.jsx"></script>
<script type="text/babel" src="NotificacionesSection.jsx"></script>

<script type="text/babel">

const APP_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "aqua",
  "dark": false
}/*EDITMODE-END*/;

const SECTION_META = {
  agenda:   { icon: 'calendar',    label: 'Agenda',   desc: 'Gestión de citas y horarios.' },
  clientes: { icon: 'users',       label: 'Clientes', desc: 'CRM: tus clientes y su historial.' },
  equipo:   { icon: 'user-check',  label: 'Equipo',   desc: 'Colaboradores, roles y disponibilidad.' },
  espacios: { icon: 'building-2',  label: 'Espacios', desc: 'Salas, boxes y espacios físicos.' },
  recursos: { icon: 'package',     label: 'Recursos', desc: 'Equipamiento y materiales por cita.' },
};

function PlaceholderView({ section }) {
  const meta = SECTION_META[section] || { icon: 'layout', label: section, desc: '' };
  return (
    <div className="placeholder-view">
      <Icon name={meta.icon} />
      <h2>{meta.label}</h2>
      <p>{meta.desc}</p>
      <p style={{ marginTop: 4, fontSize: 12, opacity: .6 }}>Esta sección está en construcción.</p>
    </div>
  );
}

function AppRoot() {
  const [section, setSection] = React.useState('home');
  const [sub, setSub] = React.useState(null);
  const [t, setTweak] = useTweaks(APP_TWEAK_DEFAULTS);

  // Store de citas compartido entre el Inicio y la Agenda
  const [citas, setCitas] = React.useState(() => (window.MOCK_CITAS_HOY || []));
  const saveCita = (cita) => {
    setCitas(prev =>
      (prev.some(c => c.id === cita.id)
        ? prev.map(c => (c.id === cita.id ? cita : c))
        : [...prev, cita]
      ).sort((a, b) => a.hora.localeCompare(b.hora))
    );
  };

  // Store de bloqueos de horario (compartido entre Inicio y Agenda)
  const [bloqueos, setBloqueos] = React.useState(() => (window.MOCK_BLOQUEOS || []));
  const saveBloqueo = (b) => {
    setBloqueos(prev =>
      prev.some(x => x.id === b.id) ? prev.map(x => (x.id === b.id ? b : x)) : [...prev, b]
    );
  };
  const removeBloqueo = (id) => setBloqueos(prev => prev.filter(x => x.id !== id));

  // Store de clientes (CRM)
  const [clientes, setClientes] = React.useState(() => (window.MOCK_CLIENTES || []));
  const saveCliente = (cliente) => {
    setClientes(prev =>
      prev.some(c => c.id === cliente.id)
        ? prev.map(c => (c.id === cliente.id ? cliente : c))
        : [cliente, ...prev]
    );
  };

  // Store de colaboradores (Equipo)
  const [colaboradores, setColaboradores] = React.useState(() => (window.MOCK_COLABORADORES || []));
  const saveColaborador = (col) => {
    setColaboradores(prev =>
      prev.some(c => c.id === col.id)
        ? prev.map(c => (c.id === col.id ? col : c))
        : [...prev, col]
    );
  };

  // Store de espacios
  const [espacios, setEspacios] = React.useState(() => (window.MOCK_ESPACIOS || []));
  const saveEspacio = (esp) => {
    setEspacios(prev =>
      prev.some(e => e.id === esp.id)
        ? prev.map(e => (e.id === esp.id ? esp : e))
        : [...prev, esp]
    );
  };

  // Store de recursos
  const [recursos, setRecursos] = React.useState(() => (window.MOCK_RECURSOS || []));
  const saveRecurso = (rec) => {
    setRecursos(prev =>
      prev.some(r => r.id === rec.id)
        ? prev.map(r => (r.id === rec.id ? rec : r))
        : [...prev, rec]
    );
  };

  // Store de servicios (catálogo)
  const [servicios, setServicios] = React.useState(() => (window.MOCK_SERVICIOS || []));
  const saveServicio = (svc) => {
    setServicios(prev =>
      prev.some(s => s.id === svc.id)
        ? prev.map(s => (s.id === svc.id ? svc : s))
        : [...prev, svc]
    );
  };

  React.useEffect(() => {
    document.body.dataset.theme = t.dark ? 'dark' : 'light';
    document.body.dataset.accent = t.accent;
  }, [t.dark, t.accent]);

  const handleSection = (s) => {
    setSection(s);
    setSub(null);
  };

  const content = section === 'home'
    ? <DashboardHome citas={citas} onSaveCita={saveCita} onSaveCliente={saveCliente} onSaveBloqueo={saveBloqueo} onNavigate={handleSection} />
    : section === 'agenda'
      ? <AgendaSection sub={sub || 'hoy'} citas={citas} onSaveCita={saveCita} bloqueos={bloqueos} onSaveBloqueo={saveBloqueo} onRemoveBloqueo={removeBloqueo} />
      : section === 'clientes'
        ? <ClientesSection sub={sub || 'todos'} clientes={clientes} onSaveCliente={saveCliente} />
      : section === 'servicios'
        ? <ServiciosSection sub={sub} servicios={servicios} onSaveServicio={saveServicio} />
      : section === 'equipo'
        ? <EquipoSection sub={sub} colaboradores={colaboradores} onSaveColaborador={saveColaborador} />
      : section === 'espacios'
        ? <EspaciosSection sub={sub} espacios={espacios} onSaveEspacio={saveEspacio} />
      : section === 'recursos'
        ? <RecursosSection sub={sub} recursos={recursos} onSaveRecurso={saveRecurso} />
      : section === 'reservas'
        ? <ReservasConfigSection sub={sub} />
      : section === 'notificaciones'
        ? <NotificacionesView />
      : section === 'perfil'
        ? <PerfilSection />
      : section === 'negocio'
        ? <NegocioSection />
      : section === 'plan'
        ? <PlanSection />
      : section === 'config'
        ? <ConfigSection theme={t} onTweak={setTweak} />
        : <PlaceholderView section={section} />;

  return (
    <>
      <AppShell
        section={section}
        onSection={handleSection}
        sub={sub}
        onSub={setSub}
        theme={t}
        onTweak={setTweak}
      >
        {content}
      </AppShell>

      <TweaksPanel title="Tweaks · AGND app">
        <TweakSection label="Tema">
          <TweakRadio
            label="Acento"
            value={t.accent}
            options={[
              { value: 'aqua',  label: 'Aqua' },
              { value: 'rose',  label: 'Rosa' },
              { value: 'plum',  label: 'Plum' },
              { value: 'coral', label: 'Coral' },
            ]}
            onChange={(v) => setTweak('accent', v)}
          />
          <TweakToggle
            label="Modo oscuro"
            value={t.dark}
            onChange={(v) => setTweak('dark', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppRoot />);

</script>
</body>
</html>
